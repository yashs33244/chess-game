name: Deploy to EC2

on:
  workflow_run:
    workflows: ["Docker Build and Publish"]
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/chess-app
            git pull
            
            # Create .env files if they don't exist
            cat > .env << EOL
            COMPOSE_DOCKER_CLI_BUILD=1
            DOCKER_BUILDKIT=1
            
            # Frontend Environment Variables
            VITE_APP_WS_URL=ws://\${EC2_PUBLIC_IP}:8080
            VITE_APP_BACKEND_URL=http://\${EC2_PUBLIC_IP}:3003
            
            # Backend Environment Variables
            DATABASE_URL=postgresql://postgres:postgres@postgres:5432/chess?schema=public
            NODE_ENV=production
            PORT=3003
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            ALLOWED_HOSTS=http://\${EC2_PUBLIC_IP}
            AUTH_REDIRECT_URL=http://\${EC2_PUBLIC_IP}/game/random
            
            # Database Environment Variables
            POSTGRES_USER=postgres
            POSTGRES_PASSWORD=postgres
            POSTGRES_DB=chess
            EOL
            
            # Login to DockerHub
            docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}
            
            # Pull latest images and deploy
            docker compose pull
            docker compose down
            docker compose up -d
            
            # Run database migrations
            docker compose exec backend sh -c "cd /app/packages/db && npx prisma db push" 