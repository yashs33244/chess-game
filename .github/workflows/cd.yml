name: CD

on:
  push:
    branches: [main]

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: |
            yashs3324/chess-backend:latest
            yashs3324/chess-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push ws
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/ws/Dockerfile
          push: true
          tags: |
            yashs3324/chess-ws:latest
            yashs3324/chess-ws:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          tags: |
            yashs3324/chess-frontend:latest
            yashs3324/chess-frontend:${{ github.sha }}
          build-args: |
            VITE_APP_WS_URL=wss://ws-chess.itsyash.space
            VITE_APP_BACKEND_URL=https://api-chess.itsyash.space
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # TODO: add deploy step — pull new images on production server and restart containers
