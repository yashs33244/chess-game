name: Docker Build and Publish

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/chess-frontend
            ${{ secrets.DOCKERHUB_USERNAME }}/chess-backend
            ${{ secrets.DOCKERHUB_USERNAME }}/chess-ws

      # Build and push Frontend
      - name: Build and push Frontend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./apps/frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/chess-frontend:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/chess-frontend:latest
          cache-to: type=inline

      # Build and push Backend
      - name: Build and push Backend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./apps/backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/chess-backend:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/chess-backend:latest
          cache-to: type=inline

      # Build and push WebSocket server
      - name: Build and push WebSocket server
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./apps/ws/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/chess-ws:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/chess-ws:latest
          cache-to: type=inline 