services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-chess}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-chesspassword}
      POSTGRES_DB: ${DB_NAME:-chessdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-chess} -d ${DB_NAME:-chessdb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-postgresql://chess:chesspassword@postgres:5432/chessdb}
      COOKIE_SECRET: ${COOKIE_SECRET:-REPLACE_WITH_REAL_SECRET}
      ALLOWED_HOSTS: ${FRONTEND_URL:-http://localhost}
      AUTH_REDIRECT_URL: ${FRONTEND_URL:-http://localhost}${AUTH_REDIRECT_PATH:-/game/random}
      JWT_SECRET: ${JWT_SECRET:-REPLACE_WITH_REAL_JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-REPLACE_WITH_GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-REPLACE_WITH_GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-REPLACE_WITH_GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-REPLACE_WITH_GITHUB_CLIENT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health 2>/dev/null || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 5

  ws:
    build:
      context: .
      dockerfile: apps/ws/Dockerfile
    restart: unless-stopped
    ports:
      - "${WS_PORT:-3012}:8080"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://chess:chesspassword@postgres:5432/chessdb}
      JWT_SECRET: ${JWT_SECRET:-REPLACE_WITH_REAL_JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_APP_WS_URL: ${WS_URL:-ws://localhost:8080}
        VITE_APP_BACKEND_URL: ${BACKEND_URL:-http://localhost:3000}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3010}:80"
    depends_on:
      - backend
      - ws

volumes:
  postgres_data:
